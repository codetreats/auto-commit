<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Commit Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <button class="btn" id="generateBtn" disabled>Generate Messages</button>
        <button class="btn" id="commitBtn" disabled>Commit and Push</button>
    </div>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <!-- Wird dynamisch gefüllt -->
        </div>

        <div class="main-content">
            <div class="empty-state" id="emptyState">
                Wähle ein Repository aus der Liste
            </div>
            
            <div class="file-list" id="fileList" style="display: none;">
                <!-- Wird dynamisch gefüllt -->
            </div>

            <div class="diff-viewer" id="diffViewer" style="display: none;">
                <!-- Wird dynamisch gefüllt -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
